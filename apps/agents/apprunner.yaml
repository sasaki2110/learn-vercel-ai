# AWS App Runner configuration
version: 1.0
runtime: nodejs20
build:
  commands:
    build:
      - npm ci
      - npm run build:internal
run:
  runtime-version: 20
  command: npx @langchain/langgraph-cli dev --port 2024 --config ../../langgraph.json --host 0.0.0.0
  network:
    port: 2024
    env: PORT
  env:
    - name: NODE_ENV
      value: production

